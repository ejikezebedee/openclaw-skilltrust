      <text x="24" y="32" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Open source. Transparent. Built for defenders.</text>
      <text x="24" y="60" fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Local-first review for skills, plugins, MCP tools, connectors, and AI supply-chain evidence.</text>
      <rect x="680" y="23" width="118" height="36" rx="18" fill="#10351f" stroke="#2f7d46"/>
      <text x="739" y="47" text-anchor="middle" fill="#75ef7a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Verified</text>
