      <text x="24" y="36" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">QUARANTINE STATUS</text>
      <path d="M121 96 L190 128 V200 C190 254 151 285 121 300 C91 285 52 254 52 200 V128 Z" fill="#112c55" stroke="#5da3ff" stroke-width="4"/>
      <rect x="91" y="163" width="60" height="56" rx="8" fill="#5da3ff"/>
      <path d="M99 163 V141 C99 126 109 116 121 116 C133 116 143 126 143 141 V163" fill="none" stroke="#5da3ff" stroke-width="8"/>
      <text x="121" y="352" text-anchor="middle" fill="#83baff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">QUARANTINED</text>
      <text x="121" y="386" text-anchor="middle" fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Risk isolated with</text>
      <text x="121" y="409" text-anchor="middle" fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">review evidence preserved.</text>
    </g>

    <g transform="translate(602 34)">
