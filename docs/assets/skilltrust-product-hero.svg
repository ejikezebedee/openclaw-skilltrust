      OpenClaw <tspan fill="url(#accent)">SkillTrust</tspan>
    </text>
    <text x="0" y="58" fill="#c9d6e2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31">Trust scoring for AI-agent extensions</text>
    <rect x="0" y="95" width="72" height="4" rx="2" fill="#63e66d"/>
    <text x="0" y="162" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Evaluate. Verify. Trust with confidence.</text>
    <text x="0" y="202" fill="#b6c5d2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">Score, quarantine, and generate evidence for</text>
    <text x="0" y="232" fill="#b6c5d2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">AI-agent skills, plugins, MCP tools, and connectors.</text>

    <g transform="translate(0 306)">
      <rect width="392" height="84" rx="12" fill="#0c1a24" stroke="#264457"/>
      <circle cx="42" cy="42" r="23" fill="#102b2c" stroke="#63e66d"/>
      <path d="M42 25 L58 33 V48 C58 60 49 66 42 70 C35 66 26 60 26 48 V33 Z" fill="none" stroke="#63e66d" stroke-width="3"/>
      <text x="86" y="35" fill="#75ef7a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Trust Scoring</text>
      <text x="86" y="63" fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Severity-weighted risk and capability review.</text>
    </g>
    <g transform="translate(0 414)">
      <rect width="392" height="84" rx="12" fill="#0c1a24" stroke="#264457"/>
      <circle cx="42" cy="42" r="23" fill="#102032" stroke="#5da3ff"/>
      <path d="M42 25 L58 34 V50 C58 61 50 67 42 71 C34 67 26 61 26 50 V34 Z" fill="none" stroke="#5da3ff" stroke-width="3"/>
      <path d="M42 38 V53" stroke="#5da3ff" stroke-width="3"/>
      <text x="86" y="35" fill="#75b5ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Quarantine Evidence</text>
      <text x="86" y="63" fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Isolate risky extensions without deleting source.</text>
    </g>
    <g transform="translate(0 522)">
      <rect width="392" height="84" rx="12" fill="#0c1a24" stroke="#264457"/>
      <circle cx="42" cy="42" r="23" fill="#102b2c" stroke="#63e66d"/>
      <path d="M30 45 C36 31 51 31 56 42 C60 52 49 62 40 55" fill="none" stroke="#63e66d" stroke-width="3"/>
      <text x="86" y="35" fill="#75ef7a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">Supply-Chain Review</text>
      <text x="86" y="63" fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">BOM, policy packs, provenance, and CI proof.</text>
    </g>
