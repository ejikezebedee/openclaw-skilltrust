<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">OpenClaw SkillTrust product hero</title>
  <desc id="desc">Product banner showing trust scoring, quarantine evidence, and supply-chain review for AI-agent extensions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.55" stop-color="#0b1824"/>
      <stop offset="1" stop-color="#081119"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#63e66d"/>
      <stop offset="1" stop-color="#54a3ff"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 708 C250 620 403 780 654 680 C879 591 1064 668 1600 545 L1600 900 L0 900 Z" fill="#0f2432" opacity="0.42"/>
  <g opacity="0.18" stroke="#5ca8ff" stroke-width="1">
    <path d="M170 188 H540 M150 260 H620 M210 332 H560 M95 404 H500"/>
    <path d="M1180 120 H1450 M1120 198 H1510 M1050 276 H1460 M1160 354 H1540"/>
    <path d="M250 188 L350 260 L290 332 L390 404 M470 188 L550 260 L488 332"/>
    <path d="M1220 120 L1300 198 L1240 276 L1340 354 M1420 120 L1480 198 L1400 276"/>
  </g>

  <g transform="translate(78 96)">
