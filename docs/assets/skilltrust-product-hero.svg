      <path d="M70 190 A86 86 0 0 1 228 190" fill="none" stroke="#244153" stroke-width="24" stroke-linecap="round"/>
      <path d="M70 190 A86 86 0 0 1 204 121" fill="none" stroke="#63e66d" stroke-width="24" stroke-linecap="round" filter="url(#softGlow)"/>
      <text x="137" y="199" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">96</text>
      <text x="137" y="232" text-anchor="middle" fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">/100</text>
      <text x="137" y="270" text-anchor="middle" fill="#75ef7a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">TRUSTED</text>
      <g fill="#b8c9d7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">
        <text x="24" y="322">Policy controls</text>
        <text x="24" y="362">Runtime guard</text>
        <text x="24" y="402">BOM evidence</text>
      </g>
      <g stroke-width="8" stroke-linecap="round">
        <path d="M142 317 H238" stroke="#233746"/>
        <path d="M142 317 H226" stroke="#63e66d"/>
        <path d="M142 357 H238" stroke="#233746"/>
        <path d="M142 357 H218" stroke="#63e66d"/>
        <path d="M142 397 H238" stroke="#233746"/>
        <path d="M142 397 H232" stroke="#63e66d"/>
      </g>
    </g>

