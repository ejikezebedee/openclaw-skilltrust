      <text x="24" y="36" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">EVIDENCE REPORT</text>
      <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">
        <g transform="translate(24 70)">
          <rect width="212" height="44" rx="8" fill="#0e1f2b" stroke="#223848"/>
          <text x="14" y="27" fill="#ffffff">Static analysis</text>
          <circle cx="188" cy="22" r="12" fill="#143b69"/><text x="188" y="27" text-anchor="middle" fill="#9dccff">3</text>
        </g>
        <g transform="translate(24 132)">
          <rect width="212" height="44" rx="8" fill="#0e1f2b" stroke="#223848"/>
          <text x="14" y="27" fill="#ffffff">Runtime guard</text>
          <circle cx="188" cy="22" r="12" fill="#143b69"/><text x="188" y="27" text-anchor="middle" fill="#9dccff">5</text>
        </g>
        <g transform="translate(24 194)">
          <rect width="212" height="44" rx="8" fill="#0e1f2b" stroke="#223848"/>
          <text x="14" y="27" fill="#ffffff">Supply chain</text>
          <circle cx="188" cy="22" r="12" fill="#143b69"/><text x="188" y="27" text-anchor="middle" fill="#9dccff">6</text>
        </g>
        <g transform="translate(24 256)">
          <rect width="212" height="44" rx="8" fill="#0e1f2b" stroke="#223848"/>
          <text x="14" y="27" fill="#ffffff">Provenance</text>
          <circle cx="188" cy="22" r="12" fill="#143b69"/><text x="188" y="27" text-anchor="middle" fill="#9dccff">2</text>
        </g>
