      <rect x="24" y="386" width="212" height="44" rx="8" fill="#10351f" stroke="#2f7d46"/>
      <text x="130" y="414" text-anchor="middle" fill="#75ef7a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Evidence Ready</text>
